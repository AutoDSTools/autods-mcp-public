services:
  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: autods-mcp-server:local
    container_name: autods-mcp-server
    ports:
      - "2049:2049"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - ./manifests:/app/manifests
    command:
      [
        "uvicorn",
        "--factory",
        "autods_mcp_server.app:create_app",
        "--host",
        "0.0.0.0",
        "--port",
        "2049",
        "--reload",
        "--reload-dir",
        "/app/src",
      ]
