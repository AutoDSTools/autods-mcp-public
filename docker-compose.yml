services:
  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: autods-mcp-server:local
    container_name: autods-mcp-server
    ports:
      - "2049:2049"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    # REDIS_URL points at the sidecar below. .env may override it; if left
    # unset entirely the app falls back to the in-process rate limiter.
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      - redis
    volumes:
      - ./src:/app/src
      - ./manifests:/app/manifests
    command:
      [
        "uvicorn",
        "--factory",
        "autods_mcp_server.app:create_app",
        "--host",
        "0.0.0.0",
        "--port",
        "2049",
        "--reload",
        "--reload-dir",
        "/app/src",
      ]

  redis:
    image: redis:7-alpine
    container_name: autods-mcp-redis
    ports:
      - "6379:6379"
